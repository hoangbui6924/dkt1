name: ci

# Chỉ chạy khi project B1 (hoặc chính workflow này) thay đổi — repo còn chứa dự án khác.
on:
  push:
    paths:
      - 'project B1/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'project B1/**'
      - '.github/workflows/ci.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: dotnet build
        run: dotnet build "project B1/backend/QuanLyTruongHoc.sln" --configuration Release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'project B1/frontend'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: 'project B1/frontend/package-lock.json'
      - run: npm ci
      - run: npm run build   # tsc -b && vite build — bắt lỗi TS strict (TS6133)
