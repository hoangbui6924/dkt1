name: Runtime Ledger Browser Replay Evidence

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/runtime-ledger-browser-replay-evidence.yml"
      - "docs/operations/WIII_SYSTEM_CONTROL_PLANE.md"
      - "docs/operations/WIII_OPENHUMAN_REFERENCE_AUDIT_2026-05-26.md"
      - "tools/wiii_self_harness/**"
      - "tools/wiii_self_harness/test_validate_runtime_evidence_artifact.py"
      - "maritime-ai-service/scripts/wiii_runtime_flow_acceptance.py"
      - "maritime-ai-service/tests/unit/test_wiii_runtime_flow_acceptance.py"
      - "wiii-desktop/scripts/run-runtime-ledger-browser-replay.mjs"
      - "wiii-desktop/scripts/run-runtime-ledger-browser-replay-local.mjs"
      - "wiii-desktop/scripts/probe-runtime-ledger-browser-replay-evidence.mjs"
      - "wiii-desktop/scripts/runtime-evidence-output.mjs"
      - "wiii-desktop/scripts/test-runtime-evidence-output.mjs"
      - "wiii-desktop/playwright.runtime-ledger.config.ts"
      - "wiii-desktop/playwright/runtime-ledger-panel.spec.ts"
      - "wiii-desktop/src/lib/runtime-flow-trace.ts"
      - "wiii-desktop/src/__tests__/runtime-flow-trace.test.ts"
  push:
    branches: [main]
    paths:
      - ".github/workflows/runtime-ledger-browser-replay-evidence.yml"
      - "docs/operations/WIII_SYSTEM_CONTROL_PLANE.md"
      - "docs/operations/WIII_OPENHUMAN_REFERENCE_AUDIT_2026-05-26.md"
      - "tools/wiii_self_harness/**"
      - "tools/wiii_self_harness/test_validate_runtime_evidence_artifact.py"
      - "maritime-ai-service/scripts/wiii_runtime_flow_acceptance.py"
      - "maritime-ai-service/tests/unit/test_wiii_runtime_flow_acceptance.py"
      - "wiii-desktop/scripts/run-runtime-ledger-browser-replay.mjs"
      - "wiii-desktop/scripts/run-runtime-ledger-browser-replay-local.mjs"
      - "wiii-desktop/scripts/probe-runtime-ledger-browser-replay-evidence.mjs"
      - "wiii-desktop/scripts/runtime-evidence-output.mjs"
      - "wiii-desktop/scripts/test-runtime-evidence-output.mjs"
      - "wiii-desktop/playwright.runtime-ledger.config.ts"
      - "wiii-desktop/playwright/runtime-ledger-panel.spec.ts"
      - "wiii-desktop/src/lib/runtime-flow-trace.ts"
      - "wiii-desktop/src/__tests__/runtime-flow-trace.test.ts"
  schedule:
    - cron: "55 4 * * *"
  workflow_dispatch:
    inputs:
      run_browser_replay:
        description: "Run the guarded backend evidence -> desktop Runtime-tab replay."
        required: true
        type: boolean
        default: false
      replay_mode:
        description: "Use local disposable backend or an already-running backend."
        required: true
        type: choice
        default: local
        options:
          - local
          - remote
      backend_url:
        description: "Backend URL for remote replay mode."
        required: false
        type: string
        default: "http://127.0.0.1:8000"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  contract:
    name: Browser Replay Contract
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ENVIRONMENT: development
      PYTHONIOENCODING: utf-8
      GOOGLE_API_KEY: fake-key-for-unit-tests

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: maritime-ai-service/requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wiii-desktop/package-lock.json

      - name: Install backend dependencies
        working-directory: maritime-ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install desktop dependencies
        working-directory: wiii-desktop
        run: npm ci

      - name: Run backend runtime-flow acceptance unit tests
        working-directory: maritime-ai-service
        run: python -m pytest tests/unit/test_wiii_runtime_flow_acceptance.py -q --tb=short

      - name: Run runtime evidence artifact validator tests
        run: python -m pytest tools/wiii_self_harness/test_validate_runtime_evidence_artifact.py -q --tb=short

      - name: Run desktop runtime-ledger unit tests
        working-directory: wiii-desktop
        run: npx vitest run src/__tests__/runtime-flow-trace.test.ts --pool forks --maxWorkers=1

      - name: Run runtime evidence output helper tests
        working-directory: wiii-desktop
        run: node scripts/test-runtime-evidence-output.mjs

  browser-replay-evidence:
    name: Browser Replay Summary Evidence
    runs-on: ubuntu-latest
    environment: wiii-runtime-evidence
    timeout-minutes: 60
    needs: contract
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && inputs.run_browser_replay == true) ||
        (github.event_name == 'schedule' && vars.WIII_RUNTIME_LEDGER_BROWSER_REPLAY_EVIDENCE_ENABLED == '1')
      }}

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: wiii
          POSTGRES_PASSWORD: wiii_secret
          POSTGRES_DB: wiii_ai
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U wiii"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: development
      PYTHONIOENCODING: utf-8
      DATABASE_URL: postgresql+asyncpg://wiii:wiii_secret@localhost:5433/wiii_ai
      POSTGRES_URL_SYNC: postgresql://wiii:wiii_secret@localhost:5433/wiii_ai
      API_KEY: test-key
      GOOGLE_API_KEY: fake-key-for-unit-tests
      WIII_RUNTIME_LEDGER_BROWSER_REPLAY_EVIDENCE: "1"
      WIII_RUNTIME_FLOW_BROWSER_REPLAY_SUMMARY_JSON: runtime-flow-browser-replay-summary.json
      WIII_RUNTIME_FLOW_BROWSER_REPLAY_SUMMARY_ARCHIVE_LIMIT: "5"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: maritime-ai-service/requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wiii-desktop/package-lock.json

      - name: Install backend dependencies
        working-directory: maritime-ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install desktop dependencies
        working-directory: wiii-desktop
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: wiii-desktop
        run: npx playwright install --with-deps chromium

      - name: Generate browser replay summary evidence
        working-directory: wiii-desktop
        env:
          REPLAY_MODE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.replay_mode || 'local' }}
          BACKEND_URL_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_url || 'http://127.0.0.1:8000' }}
          WIII_RUNTIME_FLOW_COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          args=(--mode "${REPLAY_MODE_INPUT:-local}")
          if [[ "${REPLAY_MODE_INPUT:-local}" == "remote" ]]; then
            export WIII_RUNTIME_FLOW_BACKEND_URL="${BACKEND_URL_INPUT:-http://127.0.0.1:8000}"
          fi

          node scripts/probe-runtime-ledger-browser-replay-evidence.mjs \
            --allow-run \
            --out runtime-flow-browser-replay-summary.json \
            "${args[@]}"

      - name: Validate browser replay summary evidence
        working-directory: wiii-desktop
        run: |
          python ../tools/wiii_self_harness/validate_runtime_evidence_artifact.py \
            runtime-flow-browser-replay-summary.json \
            --requirement-id runtime-ledger-browser-replay

      - name: Upload browser replay summary evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtime-ledger-browser-replay-summary-${{ github.run_id }}
          path: wiii-desktop/runtime-flow-browser-replay-summary.json
          if-no-files-found: error
          retention-days: 30
