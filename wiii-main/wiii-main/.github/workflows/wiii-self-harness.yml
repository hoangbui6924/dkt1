    branches: [main]
    paths:
      - 'tools/wiii_self_harness/**'
      - 'tools/wiii_understand_harness/**'
      - 'maritime-ai-service/scripts/runtime_evidence_output.py'
      - 'maritime-ai-service/tests/unit/test_runtime_evidence_output.py'
      - 'wiii-desktop/scripts/runtime-evidence-output.mjs'
      - 'wiii-desktop/scripts/test-runtime-evidence-output.mjs'
      - 'docs/operations/WIII_SELF_HARNESS.md'
      - 'docs/operations/WIII_SYSTEM_CONTROL_PLANE.md'
      - 'docs/operations/WIII_CONNECT_COMPOSIO_ACCEPTANCE_RUNBOOK.md'
      - 'docs/operations/WIII_REFERENCE_SYSTEMS_AUDIT_2026-05-25.md'
      - 'docs/operations/WIII_OPENHUMAN_REFERENCE_AUDIT_2026-05-26.md'
      - 'docs/operations/WIII_OPENCLAW_REFERENCE_AUDIT_2026-05-25.md'
      - 'docs/operations/WIII_UNDERSTAND_ANYTHING_REFERENCE_AUDIT_*.md'
      - '.understandignore'
      - '.github/workflows/wiii-self-harness.yml'
      - '.github/workflows/provider-runtime-evidence.yml'
      - '.github/workflows/subagent-boundary-evidence.yml'
      - '.github/workflows/autonomy-runtime-evidence.yml'
      - '.github/workflows/lms-test-course-evidence.yml'
      - '.github/workflows/semantic-memory-write-evidence.yml'
      - '.github/workflows/wiii-connect-action-evidence.yml'
      - '.github/workflows/wiii-connect-facebook-post-replay-evidence.yml'
      - '.github/workflows/wiii-connect-composio-acceptance-evidence.yml'
      - '.github/workflows/runtime-ledger-browser-replay-evidence.yml'
      - 'maritime-ai-service/app/engine/multi_agent/context_provenance_ledger.py'
      - 'maritime-ai-service/app/engine/multi_agent/runtime_flow_ledger.py'
      - 'maritime-ai-service/tests/unit/test_context_provenance_ledger.py'
      - 'maritime-ai-service/app/api/v1/chat_stream_presenter.py'
      - 'maritime-ai-service/app/services/chat_stream_coordinator.py'
      - 'maritime-ai-service/app/services/llm_runtime_audit_service.py'
      - 'maritime-ai-service/app/services/llm_selectability_service.py'
      - 'maritime-ai-service/tests/unit/test_chat_baseline_acceptance_harness.py'
      - 'maritime-ai-service/app/engine/multi_agent/visual_intent_resolver.py'
      - 'maritime-ai-service/app/engine/multi_agent/visual_intent_support.py'
      - 'maritime-ai-service/app/engine/multi_agent/tool_collection.py'
      - 'maritime-ai-service/app/engine/multi_agent/code_studio_tool_rounds.py'
      - 'maritime-ai-service/app/engine/multi_agent/code_studio_scaffold_fallback_policy.py'
      - 'maritime-ai-service/app/engine/multi_agent/document_preview_contract.py'
      - 'maritime-ai-service/app/engine/multi_agent/direct_tool_rounds_runtime.py'
      - 'maritime-ai-service/app/engine/multi_agent/direct_node_document_preview_runtime.py'
      - 'maritime-ai-service/tests/unit/test_direct_tool_rounds_runtime.py'
      - 'maritime-ai-service/app/api/v1/host_actions.py'
      - 'maritime-ai-service/app/engine/context/host_action_audit.py'
      - 'wiii-desktop/src/hooks/useSSEStream.ts'
      - 'wiii-desktop/src/components/layout/PreviewPanel.tsx'
      - 'wiii-desktop/src/__tests__/preview-panel-ui.test.tsx'
      - 'wiii-desktop/src/__tests__/host-action-sse.test.ts'
      - 'wiii-desktop/src/components/layout/CodeStudioPanel.tsx'
      - 'wiii-desktop/src/components/chat/VisualBlock.tsx'
      - 'docs/integration/WIII_LMS_DOC_TO_COURSE_CONTRACT.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  self-harness:
    name: Wiii Self-Harness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Generate self-harness report artifacts
        run: python tools/wiii_self_harness/generate_self_harness_report_bundle.py --out-dir artifacts/wiii-self-harness --require-no-synthetic-gaps --require-credentialed-external-contracts

      - name: Validate self-harness report bundle
        run: python tools/wiii_self_harness/validate_self_harness_report_bundle.py artifacts/wiii-self-harness --json --require-self-validation --require-no-synthetic-gaps --require-credentialed-external-contracts --out artifacts/wiii-self-harness-report-bundle-validation.json

      - name: Validate scenario manifest
        run: python tools/wiii_self_harness/run_wiii_self_harness.py --json --out artifacts/wiii-self-harness-validation.json

      - name: Validate runtime evidence registry
        run: python tools/wiii_self_harness/validate_runtime_evidence_registry.py --json --out artifacts/wiii-runtime-evidence-registry-validation.json

      - name: Validate self-harness sidecar parity
        run: python tools/wiii_self_harness/validate_self_harness_sidecar_parity.py --bundle-root artifacts/wiii-self-harness --self-harness-sidecar artifacts/wiii-self-harness-validation.json --registry-sidecar artifacts/wiii-runtime-evidence-registry-validation.json --json --out artifacts/wiii-self-harness-sidecar-parity-validation.json

      - name: Smoke completion audit handoff
        run: python tools/wiii_self_harness/smoke_completion_audit_handoff.py --self-harness-report-bundle artifacts/wiii-self-harness --artifact-bundle-root artifacts/runtime-evidence-empty --out-dir artifacts/wiii-completion-audit-smoke --json-out artifacts/wiii-completion-audit-smoke.json --release-gate-json-out artifacts/wiii-completion-audit-smoke-release-gate-validation.json

      - name: Validate completion audit handoff smoke bundle
        run: python tools/wiii_self_harness/validate_completion_audit_handoff.py artifacts/wiii-completion-audit-smoke --json --out artifacts/wiii-completion-audit-smoke-validation.json

      - name: Validate completion audit smoke sidecars
        run: python tools/wiii_self_harness/validate_completion_audit_smoke.py artifacts/wiii-completion-audit-smoke.json --release-gate-json artifacts/wiii-completion-audit-smoke-release-gate-validation.json --structural-validation-json artifacts/wiii-completion-audit-smoke-validation.json --require-handoff-root-source --json --out artifacts/wiii-completion-audit-smoke-sidecars-validation.json

      - name: Report non-LMS completion audit readiness
        run: |
          READINESS_AS_OF="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python tools/wiii_self_harness/report_completion_audit_readiness.py artifacts/runtime-evidence-empty --self-harness-report-bundle artifacts/wiii-self-harness --exclude-requirement-id lms-test-course-replay --as-of "$READINESS_AS_OF" --format json --out artifacts/wiii-completion-audit-readiness-non-lms.json
          python tools/wiii_self_harness/report_completion_audit_readiness.py artifacts/runtime-evidence-empty --self-harness-report-bundle artifacts/wiii-self-harness --exclude-requirement-id lms-test-course-replay --as-of "$READINESS_AS_OF" --format markdown --out artifacts/wiii-completion-audit-readiness-non-lms.md

      - name: Validate non-LMS completion audit readiness report
        run: python tools/wiii_self_harness/validate_completion_audit_readiness.py artifacts/wiii-completion-audit-readiness-non-lms.json --markdown-report artifacts/wiii-completion-audit-readiness-non-lms.md --self-harness-report-bundle artifacts/wiii-self-harness --json --out artifacts/wiii-completion-audit-readiness-validation-non-lms.json

      - name: Generate non-LMS completion audit run plan
        run: |
          python tools/wiii_self_harness/generate_completion_audit_run_plan.py artifacts/wiii-completion-audit-readiness-non-lms.json --format json --out artifacts/wiii-completion-audit-run-plan-non-lms.json
          python tools/wiii_self_harness/generate_completion_audit_run_plan.py artifacts/wiii-completion-audit-readiness-non-lms.json --format markdown --out artifacts/wiii-completion-audit-run-plan-non-lms.md

      - name: Validate non-LMS completion audit run plan
        run: python tools/wiii_self_harness/validate_completion_audit_run_plan.py artifacts/wiii-completion-audit-run-plan-non-lms.json --readiness-report artifacts/wiii-completion-audit-readiness-non-lms.json --readiness-markdown-report artifacts/wiii-completion-audit-readiness-non-lms.md --readiness-preflight-dir artifacts --self-harness-report-bundle artifacts/wiii-self-harness --markdown-report artifacts/wiii-completion-audit-run-plan-non-lms.md --json --out artifacts/wiii-completion-audit-run-plan-validation-non-lms.json

      - name: Generate non-LMS completion audit launch pack
        run: |
          python tools/wiii_self_harness/generate_completion_audit_launch_pack.py artifacts/wiii-completion-audit-run-plan-non-lms.json --format json --out artifacts/wiii-completion-audit-launch-pack-non-lms.json
          python tools/wiii_self_harness/generate_completion_audit_launch_pack.py artifacts/wiii-completion-audit-run-plan-non-lms.json --format markdown --out artifacts/wiii-completion-audit-launch-pack-non-lms.md

      - name: Validate non-LMS completion audit launch pack
        run: python tools/wiii_self_harness/validate_completion_audit_launch_pack.py artifacts/wiii-completion-audit-launch-pack-non-lms.json --run-plan artifacts/wiii-completion-audit-run-plan-non-lms.json --repo-root . --markdown-report artifacts/wiii-completion-audit-launch-pack-non-lms.md --json --out artifacts/wiii-completion-audit-launch-pack-validation-non-lms.json

      - name: Generate non-LMS completion audit setup state
        run: python tools/wiii_self_harness/generate_completion_audit_setup_state.py artifacts/wiii-completion-audit-launch-pack-non-lms.json --repo-root . --out artifacts/wiii-completion-audit-setup-state-non-lms.json

      - name: Validate non-LMS completion audit setup state
        run: python tools/wiii_self_harness/validate_completion_audit_setup_state.py artifacts/wiii-completion-audit-setup-state-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --json --out artifacts/wiii-completion-audit-setup-state-validation-non-lms.json

      - name: Generate non-LMS completion audit setup handle plan
        run: python tools/wiii_self_harness/generate_completion_audit_setup_handle_plan.py artifacts/wiii-completion-audit-setup-state-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --out artifacts/wiii-completion-audit-setup-handle-plan-non-lms.json

      - name: Validate non-LMS completion audit setup handle plan
        run: python tools/wiii_self_harness/validate_completion_audit_setup_handle_plan.py artifacts/wiii-completion-audit-setup-handle-plan-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --json --out artifacts/wiii-completion-audit-setup-handle-plan-validation-non-lms.json

      - name: Report non-LMS completion audit setup gaps
        run: |
          python tools/wiii_self_harness/report_completion_audit_setup_gaps.py artifacts/wiii-completion-audit-setup-handle-plan-non-lms.json --format json --out artifacts/wiii-completion-audit-setup-gaps-non-lms.json
          python tools/wiii_self_harness/report_completion_audit_setup_gaps.py artifacts/wiii-completion-audit-setup-handle-plan-non-lms.json --format markdown --out artifacts/wiii-completion-audit-setup-gaps-non-lms.md

      - name: Validate non-LMS completion audit setup gaps
        run: python tools/wiii_self_harness/validate_completion_audit_setup_gaps.py artifacts/wiii-completion-audit-setup-gaps-non-lms.json --setup-handle-plan artifacts/wiii-completion-audit-setup-handle-plan-non-lms.json --markdown-report artifacts/wiii-completion-audit-setup-gaps-non-lms.md --json --out artifacts/wiii-completion-audit-setup-gaps-validation-non-lms.json

      - name: Generate non-LMS completion audit setup attestation template
        run: python tools/wiii_self_harness/generate_completion_audit_setup_attestation_template.py artifacts/wiii-completion-audit-setup-handle-plan-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --out artifacts/wiii-completion-audit-setup-attestation-template-non-lms.json

      - name: Validate non-LMS completion audit setup attestation template
        run: python tools/wiii_self_harness/validate_completion_audit_setup_attestation_template.py artifacts/wiii-completion-audit-setup-attestation-template-non-lms.json --setup-handle-plan artifacts/wiii-completion-audit-setup-handle-plan-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --json --out artifacts/wiii-completion-audit-setup-attestation-template-validation-non-lms.json

      - name: Smoke non-LMS completion audit setup attestation path
        run: python tools/wiii_self_harness/smoke_completion_audit_setup_attestation.py --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --setup-handle-plan artifacts/wiii-completion-audit-setup-handle-plan-non-lms.json --template artifacts/wiii-completion-audit-setup-attestation-template-non-lms.json --out-dir artifacts/wiii-completion-audit-setup-attestation-smoke --json-out artifacts/wiii-completion-audit-setup-attestation-smoke.json --repo-root .

      - name: Validate non-LMS completion audit setup attestation smoke
        run: python tools/wiii_self_harness/validate_completion_audit_setup_attestation_smoke.py artifacts/wiii-completion-audit-setup-attestation-smoke.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --setup-handle-plan artifacts/wiii-completion-audit-setup-handle-plan-non-lms.json --template artifacts/wiii-completion-audit-setup-attestation-template-non-lms.json --out-dir artifacts/wiii-completion-audit-setup-attestation-smoke --repo-root . --json --out artifacts/wiii-completion-audit-setup-attestation-smoke-validation-non-lms.json

      - name: Generate non-LMS completion audit dispatch gate
        run: python tools/wiii_self_harness/generate_completion_audit_dispatch_gate.py artifacts/wiii-completion-audit-launch-pack-non-lms.json artifacts/wiii-completion-audit-setup-state-non-lms.json --out artifacts/wiii-completion-audit-dispatch-gate-non-lms.json

      - name: Validate non-LMS completion audit dispatch gate
        run: python tools/wiii_self_harness/validate_completion_audit_dispatch_gate.py artifacts/wiii-completion-audit-dispatch-gate-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --json --out artifacts/wiii-completion-audit-dispatch-gate-validation-non-lms.json

      - name: Materialize non-LMS completion audit dispatch run
        run: python tools/wiii_self_harness/run_completion_audit_dispatch_gate.py artifacts/wiii-completion-audit-dispatch-gate-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --repo-root . --allow-pending-report --out artifacts/wiii-completion-audit-dispatch-run-non-lms.json

      - name: Validate non-LMS completion audit dispatch run
        run: python tools/wiii_self_harness/validate_completion_audit_dispatch_run.py artifacts/wiii-completion-audit-dispatch-run-non-lms.json --dispatch-gate artifacts/wiii-completion-audit-dispatch-gate-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --repo-root . --json --out artifacts/wiii-completion-audit-dispatch-run-validation-non-lms.json

      - name: Materialize non-LMS completion audit dispatch diagnostics
        run: python tools/wiii_self_harness/run_completion_audit_dispatch_diagnostics.py artifacts/wiii-completion-audit-dispatch-run-non-lms.json --dispatch-gate artifacts/wiii-completion-audit-dispatch-gate-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --repo-root . --out artifacts/wiii-completion-audit-dispatch-diagnostics-non-lms.json

      - name: Validate non-LMS completion audit dispatch diagnostics
        run: python tools/wiii_self_harness/validate_completion_audit_dispatch_diagnostics.py artifacts/wiii-completion-audit-dispatch-diagnostics-non-lms.json --dispatch-run artifacts/wiii-completion-audit-dispatch-run-non-lms.json --dispatch-gate artifacts/wiii-completion-audit-dispatch-gate-non-lms.json --launch-pack artifacts/wiii-completion-audit-launch-pack-non-lms.json --setup-state artifacts/wiii-completion-audit-setup-state-non-lms.json --repo-root . --json --out artifacts/wiii-completion-audit-dispatch-diagnostics-validation-non-lms.json

      - name: Generate non-LMS completion audit handoff for recovery
        run: python tools/wiii_self_harness/generate_completion_audit_handoff.py artifacts/runtime-evidence-empty --self-harness-report-bundle artifacts/wiii-self-harness --readiness-report artifacts/wiii-completion-audit-readiness-non-lms.json --setup-gap-report artifacts/wiii-completion-audit-setup-gaps-non-lms.json --setup-gap-markdown-report artifacts/wiii-completion-audit-setup-gaps-non-lms.md --out-dir artifacts/wiii-completion-audit-handoff-non-lms --allow-not-ready

      - name: Validate non-LMS completion audit handoff for recovery
        run: python tools/wiii_self_harness/validate_completion_audit_handoff.py artifacts/wiii-completion-audit-handoff-non-lms --json --out artifacts/wiii-completion-audit-handoff-validation-non-lms.json

      - name: Generate non-LMS completion audit recovery plan
        run: |
          python tools/wiii_self_harness/generate_completion_audit_recovery_plan.py artifacts/wiii-completion-audit-handoff-non-lms/completion-audit-handoff.json --format json --out artifacts/wiii-completion-audit-recovery-plan-non-lms.json
          python tools/wiii_self_harness/generate_completion_audit_recovery_plan.py artifacts/wiii-completion-audit-handoff-non-lms/completion-audit-handoff.json --format markdown --out artifacts/wiii-completion-audit-recovery-plan-non-lms.md

      - name: Validate non-LMS completion audit recovery plan
        run: python tools/wiii_self_harness/validate_completion_audit_recovery_plan.py artifacts/wiii-completion-audit-recovery-plan-non-lms.json --handoff-json artifacts/wiii-completion-audit-handoff-non-lms/completion-audit-handoff.json --json --out artifacts/wiii-completion-audit-recovery-plan-validation-non-lms.json

      - name: Materialize non-LMS completion audit recovery queue
        run: python tools/wiii_self_harness/run_completion_audit_recovery_queue.py artifacts/wiii-completion-audit-recovery-plan-non-lms.json --handoff-json artifacts/wiii-completion-audit-handoff-non-lms/completion-audit-handoff.json --out artifacts/wiii-completion-audit-recovery-queue-non-lms.json

      - name: Validate non-LMS completion audit recovery queue
        run: python tools/wiii_self_harness/validate_completion_audit_recovery_queue.py artifacts/wiii-completion-audit-recovery-queue-non-lms.json --recovery-plan artifacts/wiii-completion-audit-recovery-plan-non-lms.json --handoff-json artifacts/wiii-completion-audit-handoff-non-lms/completion-audit-handoff.json --json --out artifacts/wiii-completion-audit-recovery-queue-validation-non-lms.json

      - name: Generate non-LMS completion audit recovery work order
        run: python tools/wiii_self_harness/generate_completion_audit_recovery_work_order.py artifacts/wiii-completion-audit-recovery-queue-non-lms.json --recovery-plan artifacts/wiii-completion-audit-recovery-plan-non-lms.json --handoff-json artifacts/wiii-completion-audit-handoff-non-lms/completion-audit-handoff.json --out artifacts/wiii-completion-audit-recovery-work-order-non-lms.json

