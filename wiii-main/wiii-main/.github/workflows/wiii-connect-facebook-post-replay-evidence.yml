name: Wiii Connect Facebook Post Replay Evidence

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/wiii-connect-facebook-post-replay-evidence.yml"
      - "docs/architecture/wiii-connect/**"
      - "docs/operations/WIII_SYSTEM_CONTROL_PLANE.md"
      - "docs/operations/WIII_SELF_HARNESS.md"
      - "tools/wiii_self_harness/**"
      - "maritime-ai-service/scripts/runtime_evidence_output.py"
      - "maritime-ai-service/tests/unit/test_runtime_evidence_output.py"
      - "maritime-ai-service/app/api/v1/wiii_connect.py"
      - "maritime-ai-service/app/engine/wiii_connect/**"
      - "maritime-ai-service/alembic/versions/056_create_wiii_connect_operation_approvals.py"
      - "maritime-ai-service/scripts/probe_live_wiii_connect_facebook_post_replay.py"
      - "maritime-ai-service/tests/unit/test_probe_live_wiii_connect_facebook_post_replay.py"
      - "maritime-ai-service/tests/unit/api/test_wiii_connect_api.py"
      - "maritime-ai-service/tests/unit/test_wiii_connect_persistent_storage.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/wiii-connect-facebook-post-replay-evidence.yml"
      - "docs/architecture/wiii-connect/**"
      - "docs/operations/WIII_SYSTEM_CONTROL_PLANE.md"
      - "docs/operations/WIII_SELF_HARNESS.md"
      - "tools/wiii_self_harness/**"
      - "maritime-ai-service/scripts/runtime_evidence_output.py"
      - "maritime-ai-service/tests/unit/test_runtime_evidence_output.py"
      - "maritime-ai-service/app/api/v1/wiii_connect.py"
      - "maritime-ai-service/app/engine/wiii_connect/**"
      - "maritime-ai-service/alembic/versions/056_create_wiii_connect_operation_approvals.py"
      - "maritime-ai-service/scripts/probe_live_wiii_connect_facebook_post_replay.py"
      - "maritime-ai-service/tests/unit/test_probe_live_wiii_connect_facebook_post_replay.py"
      - "maritime-ai-service/tests/unit/api/test_wiii_connect_api.py"
      - "maritime-ai-service/tests/unit/test_wiii_connect_persistent_storage.py"
  schedule:
    - cron: "35 5 * * *"
  workflow_dispatch:
    inputs:
      run_wiii_connect_facebook_post_replay:
        description: "Run the guarded Wiii Connect Facebook post replay."
        required: true
        type: boolean
        default: false
      allow_production:
        description: "Permit production settings.environment."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  contract:
    name: Facebook Post Replay Contract
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ENVIRONMENT: development
      PYTHONIOENCODING: utf-8
      GOOGLE_API_KEY: fake-key-for-unit-tests

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: maritime-ai-service/requirements.txt

      - name: Install backend dependencies
        working-directory: maritime-ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Facebook post replay contract tests
        working-directory: maritime-ai-service
        run: python -m pytest tests/unit/test_probe_live_wiii_connect_facebook_post_replay.py tests/unit/test_runtime_evidence_output.py tests/unit/api/test_wiii_connect_api.py tests/unit/test_wiii_connect_persistent_storage.py -q --tb=short

  live-wiii-connect-facebook-post-replay-evidence:
    name: Live Wiii Connect Facebook Post Replay Evidence
    runs-on: ubuntu-latest
    environment: wiii-runtime-evidence
    timeout-minutes: 30
    needs: contract
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && inputs.run_wiii_connect_facebook_post_replay == true) ||
        (github.event_name == 'schedule' && vars.WIII_CONNECT_FACEBOOK_POST_REPLAY_EVIDENCE_ENABLED == '1')
      }}

    env:
      ENVIRONMENT: development
      PYTHONIOENCODING: utf-8
      WIII_LIVE_WIII_CONNECT_FACEBOOK_POST_REPLAY: "1"
      GOOGLE_API_KEY: fake-key-for-local-replay

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: maritime-ai-service/requirements.txt

      - name: Install backend dependencies
        working-directory: maritime-ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Facebook post replay evidence
        working-directory: maritime-ai-service
        env:
          ALLOW_PRODUCTION_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_production || false }}
        run: |
          set -euo pipefail

          args=()
          if [[ "${ALLOW_PRODUCTION_INPUT}" == "true" ]]; then
            args+=(--allow-production)
          fi

          python scripts/probe_live_wiii_connect_facebook_post_replay.py --allow-run "${args[@]}" \
            --out wiii-connect-facebook-post-replay-evidence.json

      - name: Validate Facebook post replay evidence
        working-directory: maritime-ai-service
        run: |
          python ../tools/wiii_self_harness/validate_runtime_evidence_artifact.py \
            wiii-connect-facebook-post-replay-evidence.json \
            --requirement-id wiii-connect-facebook-post-replay

      - name: Upload Facebook post replay evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wiii-connect-facebook-post-replay-evidence-${{ github.run_id }}
          path: maritime-ai-service/wiii-connect-facebook-post-replay-evidence.json
          if-no-files-found: error
          retention-days: 30
