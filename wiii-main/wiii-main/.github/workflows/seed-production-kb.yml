name: Seed Production Knowledge Base

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Public Wiii API base URL."
        required: true
        default: "https://wiii.holilihu.online"
        type: string
      document_id:
        description: "Idempotent document_id to upsert into RAG."
        required: true
        default: "maritime-colregs-teaching-seed-v1"
        type: string
      domain_id:
        description: "Domain tag for the ingested chunks."
        required: true
        default: "maritime"
        type: string
      title:
        description: "Human-readable document title."
        required: true
        default: "COLREGs teaching seed corpus v1"
        type: string
      corpus_path:
        description: "Path under maritime-ai-service/ on the production checkout."
        required: true
        default: "scripts/data/maritime_seed_corpus/colregs_teaching_seed_v1.md"
        type: string
      dry_run:
        description: "Check stats and print planned ingest without writing."
        required: true
        default: false
        type: boolean
      run_rag_smoke:
        description: "After ingest, run an authenticated chat query that must return source evidence."
        required: true
        default: false
        type: boolean
      smoke_query:
        description: "RAG smoke query to send to /api/v1/chat when run_rag_smoke is true."
        required: true
        default: "According to COLREGs, in a crossing situation between two power-driven vessels with risk of collision, which vessel should give way? Cite the knowledge source if available."
        type: string

permissions:
  contents: read

concurrency:
  group: production-kb-seed
  cancel-in-progress: false

jobs:
  seed:
    name: Seed production RAG via short-lived admin JWT
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ inputs.base_url }}
    timeout-minutes: 20

    steps:
      - name: Configure SSH
        shell: bash
        env:
          PROD_HOST: ${{ secrets.WIII_PRODUCTION_HOST }}
          PROD_USER: ${{ secrets.WIII_PRODUCTION_USER }}
          PROD_SSH_KEY: ${{ secrets.WIII_PRODUCTION_SSH_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.WIII_PRODUCTION_KNOWN_HOSTS }}
          PROD_SSH_PORT: ${{ vars.WIII_PRODUCTION_SSH_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_HOST:-}" ] || [ -z "${PROD_USER:-}" ] || [ -z "${PROD_SSH_KEY:-}" ]; then
            echo "Missing required production SSH secrets: WIII_PRODUCTION_HOST, WIII_PRODUCTION_USER, WIII_PRODUCTION_SSH_KEY." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/wiii_production_key
          chmod 600 ~/.ssh/wiii_production_key
          if [ -n "${PROD_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$PROD_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PROD_SSH_PORT:-22}" "$PROD_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Seed production knowledge base
        shell: bash
        env:
          PROD_HOST: ${{ secrets.WIII_PRODUCTION_HOST }}
          PROD_USER: ${{ secrets.WIII_PRODUCTION_USER }}
          PROD_SSH_PORT: ${{ vars.WIII_PRODUCTION_SSH_PORT }}
          PROD_APP_DIR: ${{ vars.WIII_PRODUCTION_APP_DIR }}
          BASE_URL: ${{ inputs.base_url }}
          DOCUMENT_ID: ${{ inputs.document_id }}
          DOMAIN_ID: ${{ inputs.domain_id }}
          TITLE: ${{ inputs.title }}
          CORPUS_PATH: ${{ inputs.corpus_path }}
          DRY_RUN: ${{ inputs.dry_run }}
          RUN_RAG_SMOKE: ${{ inputs.run_rag_smoke }}
          SMOKE_QUERY: ${{ inputs.smoke_query }}
        run: |
          set -euo pipefail

          encode() { printf '%s' "$1" | base64 -w0; }

          APP_DIR="${PROD_APP_DIR:-/opt/wiii}"
          SSH_TARGET="${PROD_USER}@${PROD_HOST}"
          SSH_PORT="${PROD_SSH_PORT:-22}"
          BASE_URL_B64="$(encode "$BASE_URL")"
          DOCUMENT_ID_B64="$(encode "$DOCUMENT_ID")"
          DOMAIN_ID_B64="$(encode "$DOMAIN_ID")"
          TITLE_B64="$(encode "$TITLE")"
          CORPUS_PATH_B64="$(encode "$CORPUS_PATH")"
          SMOKE_QUERY_B64="$(encode "$SMOKE_QUERY")"

          ssh -i ~/.ssh/wiii_production_key -p "$SSH_PORT" "$SSH_TARGET" \
            "APP_DIR='$APP_DIR' BASE_URL_B64='$BASE_URL_B64' DOCUMENT_ID_B64='$DOCUMENT_ID_B64' DOMAIN_ID_B64='$DOMAIN_ID_B64' TITLE_B64='$TITLE_B64' CORPUS_PATH_B64='$CORPUS_PATH_B64' SMOKE_QUERY_B64='$SMOKE_QUERY_B64' DRY_RUN='$DRY_RUN' RUN_RAG_SMOKE='$RUN_RAG_SMOKE' bash -s" <<'REMOTE'
          set -euo pipefail

          decode() { printf '%s' "$1" | base64 -d; }
          clean_value() {
            local value="${1:-}"
            value="${value%$'\r'}"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            printf '%s' "$value"
          }
          env_value() {
            local key="$1"
            awk -v key="$key" '
              BEGIN { FS = "="; found = 0 }
              $0 !~ /^[[:space:]]*#/ && $1 == key {
                sub(/^[^=]*=/, "")
                print
                found = 1
              }
              END { exit found ? 0 : 1 }
            ' "$ENV_PATH" | tail -n 1
          }

          BASE_URL="$(decode "$BASE_URL_B64")"
          DOCUMENT_ID="$(decode "$DOCUMENT_ID_B64")"
          DOMAIN_ID="$(decode "$DOMAIN_ID_B64")"
          TITLE="$(decode "$TITLE_B64")"
          CORPUS_PATH="$(decode "$CORPUS_PATH_B64")"
          SMOKE_QUERY="$(decode "$SMOKE_QUERY_B64")"

          cd "$APP_DIR"
          git fetch --prune origin main
          git switch main
          git pull --ff-only origin main

          SERVICE_DIR="${APP_DIR}/maritime-ai-service"
          ENV_PATH="${SERVICE_DIR}/.env.production"
          if [ ! -f "$ENV_PATH" ]; then
            echo "Missing production env file: $ENV_PATH" >&2
            exit 1
          fi

          cd "$SERVICE_DIR"
          if [ ! -f "$CORPUS_PATH" ]; then
            echo "Corpus path not found under maritime-ai-service: $CORPUS_PATH" >&2
            exit 1
          fi

          if command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          elif command -v python >/dev/null 2>&1; then
            PYTHON_BIN="python"
          else
            echo "Python is not available on the production VM host." >&2
            exit 1
          fi

          JWT_SECRET_VALUE="$(clean_value "$(env_value JWT_SECRET_KEY || true)")"
          JWT_AUDIENCE_VALUE="$(clean_value "$(env_value JWT_AUDIENCE || true)")"
          JWT_ALGORITHM_VALUE="$(clean_value "$(env_value JWT_ALGORITHM || true)")"
          JWT_AUDIENCE_VALUE="${JWT_AUDIENCE_VALUE:-wiii}"
          JWT_ALGORITHM_VALUE="${JWT_ALGORITHM_VALUE:-HS256}"

          if [ -z "$JWT_SECRET_VALUE" ]; then
            echo "Missing JWT_SECRET_KEY in production env file." >&2
            exit 1
          fi
          if [ "$JWT_ALGORITHM_VALUE" != "HS256" ]; then
            echo "Unsupported JWT_ALGORITHM for operational seed workflow: $JWT_ALGORITHM_VALUE" >&2
            exit 1
          fi

          ADMIN_JWT="$(
            JWT_SECRET_KEY="$JWT_SECRET_VALUE" JWT_AUDIENCE="$JWT_AUDIENCE_VALUE" "$PYTHON_BIN" - <<'PY'
          import base64
          import hashlib
          import hmac
          import json
          import os
          import time
          import uuid

          def encode_json(value: dict) -> str:
              raw = json.dumps(value, separators=(",", ":"), sort_keys=True).encode("utf-8")
              return base64.urlsafe_b64encode(raw).rstrip(b"=").decode("ascii")

          now = int(time.time())
          header = {"alg": "HS256", "typ": "JWT"}
          payload = {
              "sub": "github-actions-kb-seed",
              "email": "ops@wiii.local",
              "name": "GitHub Actions KB Seed",
              "role": "admin",
              "platform_role": "platform_admin",
              "role_source": "platform",
              "identity_version": "2",
              "auth_method": "ops",
              "type": "access",
              "iss": "wiii",
              "aud": os.environ.get("JWT_AUDIENCE", "wiii"),
              "iat": now,
              "exp": now + 900,
              "jti": str(uuid.uuid4()),
          }
          signing_input = f"{encode_json(header)}.{encode_json(payload)}".encode("ascii")
          signature = hmac.new(
              os.environ["JWT_SECRET_KEY"].encode("utf-8"),
              signing_input,
              hashlib.sha256,
          ).digest()
          encoded_signature = base64.urlsafe_b64encode(signature).rstrip(b"=").decode("ascii")
          print(f"{signing_input.decode('ascii')}.{encoded_signature}")
          PY
          )"
          if [ -z "$ADMIN_JWT" ]; then
            echo "Failed to create operational admin JWT." >&2
            exit 1
          fi

          args=(
            scripts/seed_maritime_text_kb.py
            --base-url "$BASE_URL"
            --corpus "$CORPUS_PATH"
            --document-id "$DOCUMENT_ID"
            --domain-id "$DOMAIN_ID"
            --title "$TITLE"
            --bearer-token-env WIII_ADMIN_JWT
          )
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi

          WIII_ADMIN_JWT="$ADMIN_JWT" "$PYTHON_BIN" "${args[@]}"
          if [ "$RUN_RAG_SMOKE" = "true" ]; then
            WIII_ADMIN_JWT="$ADMIN_JWT" "$PYTHON_BIN" scripts/smoke_production_rag_chat.py \
              --base-url "$BASE_URL" \
              --query "$SMOKE_QUERY" \
              --domain-id "$DOMAIN_ID" \
              --bearer-token-env WIII_ADMIN_JWT \
              --require-source
          fi
          REMOTE
